name: Build and Release ZIP

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create release archive
        shell: bash
        run: |
          mkdir -p dist

          VERSION="$(python -c 'import json; print(json.load(open("package.json"))["version"])')"

          FILES=(app.js package.json controllers lib router)

          if [ -f .env.example ]; then
            cp .env.example .env
            FILES+=(.env)
          fi

          zip -r "dist/simple-whatsapp-api-${VERSION}.zip" "${FILES[@]}"

          rm -f .env

      - name: Determine release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            VERSION="$(python -c 'import json; print(json.load(open("package.json"))["version"])')"
            echo "tag_name=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag_name }}
          files: dist/*.zip
          generate_release_notes: true
          draft: false
